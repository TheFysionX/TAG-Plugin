name: test-and-attest-release

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.17.1
      - name: Test dependency-free connector
        run: npm test

  release-artifact:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.17.1
      - name: Validate immutable release contract
        run: node scripts/validate-release-contract.mjs "$GITHUB_REF_NAME"
      - name: Build source package and checksum
        run: |
          PACKAGE_ARCHIVE="$(npm pack --silent)"
          RELEASE_ARCHIVE="tag-plugin-$(node -p "require('./package.json').version").tgz"
          mv "${PACKAGE_ARCHIVE}" "${RELEASE_ARCHIVE}"
          mkdir artifact-test
          tar -xzf "${RELEASE_ARCHIVE}" -C artifact-test
          TAG_PLUGIN_PACK_ARTIFACT_CHILD=1 npm test --prefix artifact-test/package
          sha256sum "${RELEASE_ARCHIVE}" > SHA256SUMS
      - uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: tag-plugin-*.tgz
      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          --draft --verify-tag --generate-notes
      - name: Attach verified release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${GITHUB_REF_NAME}"
          tag-plugin-*.tgz SHA256SUMS
      - name: Publish release after assets are attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false
